# AgenticRAG CI — 回归测试流水线
# 触发: push 到 main / PR

name: Regression Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check API key
        id: check_key
        run: |
          if [ -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "::warning::DEEPSEEK_API_KEY secret not configured. Skipping regression tests."
          else
            echo "has_key=true" >> $GITHUB_OUTPUT
          fi

      - name: Check index files
        id: check_index
        run: |
          if [ -f "chunks.jsonl" ] && [ -f "faiss.index" ]; then
            echo "has_index=true" >> $GITHUB_OUTPUT
          else
            echo "has_index=false" >> $GITHUB_OUTPUT
            echo "::warning::Index files not found. Run data_prepare.py first."
          fi

      - name: Run regression tests
        if: steps.check_key.outputs.has_key == 'true' && steps.check_index.outputs.has_index == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RAG_LLM_MODEL: deepseek-v4-pro
          RAG_CACHE_ENABLED: "true"
          RAG_CACHE_REDIS_URL: redis://localhost:6379/0
          RAG_RERANKER_ENABLED: "true"
        run: |
          python evaluation/regression_test.py --limit 10

      - name: Summary (tests skipped)
        if: steps.check_key.outputs.has_key != 'true' || steps.check_index.outputs.has_index != 'true'
        run: |
          echo "## ⏭️ Regression tests skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Reason**: API key or index files not available in CI environment." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### To enable CI tests:" >> $GITHUB_STEP_SUMMARY
          echo "1. Add \`DEEPSEEK_API_KEY\` to repository Secrets" >> $GITHUB_STEP_SUMMARY
          echo "2. Upload index files or run \`data_prepare.py\` in CI" >> $GITHUB_STEP_SUMMARY
