# AgenticRAG CI — 回归测试流水线
# 触发条件: push 到 main 分支 / PR 创建或更新

name: Regression Test

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ragas langchain-openai  # RAGAS 评分依赖

      - name: Run regression tests
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          RAG_LLM_MODEL: deepseek-v4-pro
          RAG_CACHE_ENABLED: "true"
          RAG_CACHE_REDIS_URL: redis://localhost:6379/0
          RAG_RERANKER_ENABLED: "true"
        run: |
          python evaluation/regression_test.py --limit 10

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-results
          path: evaluation/comparison_report.md
